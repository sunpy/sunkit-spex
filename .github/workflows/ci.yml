# Main CI Workflow
name: CI

on:
  push:
    branches:
      - 'main'
      - '*.*'
      - '!*backport*'
    tags:
      - 'v*'
      - '!*dev*'
      - '!*pre*'
      - '!*post*'
  pull_request:
  # Allow manual runs through the web UI
  workflow_dispatch:
  schedule:
    #        ┌───────── minute (0 - 59)
    #        │ ┌───────── hour (0 - 23)
    #        │ │ ┌───────── day of the month (1 - 31)
    #        │ │ │ ┌───────── month (1 - 12 or JAN-DEC)
    #        │ │ │ │ ┌───────── day of the week (0 - 6 or SUN-SAT)
    - cron: '0 7 * * 3'  # Every Wed at 07:00 UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  core:
    uses: OpenAstronomy/github-actions-workflows/.github/workflows/tox.yml@v2  # zizmor: ignore[unpinned-uses]
    with:
      submodules: false
      coverage: codecov
      toxdeps: tox-pypi-filter
      cache-path: |
        $HOME/sunpy/data_manager
      cache-key: sunpy-data-linux-${{ github.ref }}
      cache-restore-keys: sunpy-data-linux-refs/heads/main
      envs: |
        - linux: py313
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  sdist_verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6  # zizmor: ignore[unpinned-uses]
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6  # zizmor: ignore[unpinned-uses]
        with:
          python-version: '3.13'
      - run: python -m pip install -U --user build
      - run: python -m build . --sdist
      - run: python -m pip install -U --user twine
      - run: python -m twine check dist/*

  test:
    needs: [core, sdist_verify]
    uses: OpenAstronomy/github-actions-workflows/.github/workflows/tox.yml@v2  # zizmor: ignore[unpinned-uses]
    with:
      submodules: false
      coverage: codecov
      toxdeps: tox-pypi-filter
      cache-path: |
        $HOME/sunpy/data_manager
      cache-key: sunpy-data-${{ github.ref }}
      posargs:
      envs: |
        - linux: py314
          cache-path: $HOME/sunpy/data_manager
          cache-key: sunpy-data-linux-${{ github.ref }}
          cache-restore-keys: sunpy-data-linux-refs/heads/main
        - windows: py312
          cache-path: $HOME/sunpy/data_manager
          cache-key: sunpy-data-windows-${{ github.ref }}
          cache-restore-keys: sunpy-data-windows-refs/heads/main
        - macos: py312
          cache-path: $HOME/sunpy/data_manager
          cache-key: sunpy-data-macos-${{ github.ref }}
          ache-restore-keys: sunpy-data-macos-refs/heads/main
        - linux: py312-oldestdeps
          cache-path: $HOME/sunpy/data_manager
          cache-key: sunpy-data-linux-${{ github.ref }}
          cache-restore-keys: sunpy-data-linux-refs/heads/main
        - linux: py314-devdeps
          cache-path: $HOME/sunpy/data_manager
          cache-key: sunpy-data-linux-${{ github.ref }}
          cache-restore-keys: sunpy-data-linux-refs/heads/main
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  docs:
    needs: [core]
    uses: OpenAstronomy/github-actions-workflows/.github/workflows/tox.yml@v2  # zizmor: ignore[unpinned-uses]
    with:
      default_python: '3.13'
      submodules: false
      pytest: false
      toxdeps: tox-pypi-filter
      libraries: |
        apt:
          - graphviz
          - pandoc
      envs: |
        - linux: build_docs

  build_dists:
    # Build wheels on PRs only when labelled. Releases will only be published if tagged ^v.*
    # see https://github-actions-workflows.openastronomy.org/en/latest/publish.html#upload-to-pypi
    if: |
      github.event_name != 'pull_request' ||
      (
        github.event_name == 'pull_request' &&
        contains(github.event.pull_request.labels.*.name, 'Run publish')
      )
    needs: [test, docs]
    uses: OpenAstronomy/github-actions-workflows/.github/workflows/publish_pure_python.yml@v2  # zizmor: ignore[unpinned-uses]
    with:
      python-version: '3.13'
      test_extras: 'tests'
      test_command: 'pytest -p no:warnings --doctest-rst --pyargs sunkit_spex'
      submodules: false
      save_artifacts: true
      upload_to_pypi: false

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    name: Upload to PyPI
    runs-on: ubuntu-latest
    needs: [build_dists]
    permissions:
      id-token: write
    environment:
      name: pypi
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8  # zizmor: ignore[unpinned-uses]
        with:
          merge-multiple: true
          pattern: dist-*
          path: dist

      - run: ls -lha dist/

      - name: Run upload
        uses: pypa/gh-action-pypi-publish@v1.13.0  # zizmor: ignore[unpinned-uses]
